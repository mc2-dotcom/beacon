<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Horseshoe Effect — Vine &amp; Fig Tree Institute</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=IBM+Plex+Mono:wght@300;400;500;600&family=Libre+Franklin:wght@300;400;500;600;700&display=swap" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --paper:#F6F2ED;
  --paper-2:#FCFFFF;
  --paper-3:#F0ECE4;
  --ink:#0C1843;
  --ink-dim:#3A4DA7;
  --ink-faint:#5B6484;
  --rule:#C8CCD8;
  --rule-2:#D4E3FC;
  --gold:#3A4DA7;
  --gold-bright:#7795CC;
  --gold-dim:#1B2866;
  --navy:#0C1843;
  --navy-bright:#3A4DA7;
  --navy-deep:#0C1843;
  --olive:#5B6484;
  --olive-bright:#7795CC;
  --before:#5B6484;
  --after:#3A4DA7;
  --warn:#8B2635;
  --chip:#F6F2ED;
  --chip-hot:#D4E3FC;
  --sidebar:#F6F2ED;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:'Libre Franklin',system-ui,sans-serif;font-weight:400;-webkit-font-smoothing:antialiased;letter-spacing:.005em}
body{background-image:radial-gradient(1200px 600px at 20% -10%, rgba(119,149,204,.08), transparent 60%),radial-gradient(900px 500px at 100% 10%, rgba(12,24,67,.05), transparent 60%)}
a{color:var(--navy);text-decoration:none;border-bottom:1px dotted var(--navy-bright)}
a:hover{color:var(--gold);border-bottom-color:var(--gold)}
.mono{font-family:'IBM Plex Mono',ui-monospace,monospace;letter-spacing:.02em}
.serif{font-family:'Cormorant Garamond',Georgia,serif}
.caps{text-transform:uppercase;letter-spacing:.22em;font-size:11px}
.hairline{border-top:1px solid var(--rule)}
.layout{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
aside.nav{position:sticky;top:0;height:100vh;overflow-y:auto;padding:28px 22px 40px;border-right:1px solid var(--rule);background:var(--sidebar)}
.brandmark{display:flex;flex-direction:column;gap:4px;margin-bottom:22px}
.brandmark .kicker{color:var(--navy);font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.32em;text-transform:uppercase;font-weight:500}
.brandmark .title{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:30px;line-height:1.02;color:var(--navy-deep);letter-spacing:-.01em}
.brandmark .sub{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink-faint);letter-spacing:.08em;margin-top:6px}
.seal{margin:14px 0 22px;padding:12px 14px;border:1px solid var(--rule-2);border-left:3px solid var(--navy);background:var(--paper-2);font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-dim);line-height:1.65}
.seal b{color:var(--navy);font-weight:600}
nav.sections{display:flex;flex-direction:column;gap:2px;margin-top:8px}
nav.sections button{all:unset;cursor:pointer;padding:9px 10px 9px 14px;display:flex;align-items:baseline;gap:10px;font-family:'Libre Franklin',sans-serif;font-size:13px;color:var(--ink-dim);font-weight:400;border-left:2px solid transparent;transition:all .15s ease}
nav.sections button:hover{color:var(--navy);background:rgba(12,24,67,.04);border-left-color:var(--gold)}
nav.sections button.active{color:var(--navy-deep);border-left-color:var(--navy);background:rgba(12,24,67,.06);font-weight:500}
nav.sections .num{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-faint);min-width:20px}
nav.sections button.active .num{color:var(--gold)}
.nav-foot{margin-top:28px;padding-top:18px;border-top:1px solid var(--rule-2);font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-faint);line-height:1.7}
.nav-foot .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--olive-bright);margin-right:6px;vertical-align:middle;box-shadow:0 0 8px rgba(119,149,204,.6)}
main{padding:48px 56px 120px;max-width:1180px}
section{margin-bottom:86px;scroll-margin-top:24px}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:26px;padding-bottom:14px;border-bottom:1px solid var(--rule-2)}
.section-head .h-left{display:flex;flex-direction:column;gap:4px}
.section-head .tag{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--navy);letter-spacing:.28em;text-transform:uppercase;font-weight:500}
.section-head h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:40px;line-height:1.02;margin:0;color:var(--navy-deep);letter-spacing:-.01em}
.section-head .h-right{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-faint);text-align:right;letter-spacing:.04em;max-width:340px;line-height:1.65}
.headline{border:1px solid var(--rule-2);padding:30px 34px;margin-bottom:40px;background:var(--paper-2);position:relative;overflow:hidden;box-shadow:0 1px 0 rgba(12,24,67,.04)}
.headline::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg, var(--navy) 0%, var(--navy-bright) 55%, var(--gold-bright) 100%)}
.headline .dek{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:22px;font-weight:500;line-height:1.45;color:var(--navy-deep);max-width:900px}
.headline .byline{margin-top:16px;font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink-faint);letter-spacing:.08em}
.grid-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.metric{border:1px solid var(--rule);padding:20px 20px 18px;background:var(--paper-2);position:relative;transition:all .18s ease;cursor:default;box-shadow:0 1px 0 rgba(12,24,67,.03)}
.metric:hover{border-color:var(--navy-bright);transform:translateY(-1px);box-shadow:0 4px 16px rgba(12,24,67,.08)}
.metric .k{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-faint);letter-spacing:.18em;text-transform:uppercase;font-weight:500}
.metric .v{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:46px;line-height:1;margin-top:10px;color:var(--navy-deep);letter-spacing:-.015em}
.metric .u{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-dim);margin-top:8px;letter-spacing:.03em;line-height:1.5}
.metric.alt .v{color:var(--gold)}
.metric.navy .v{color:var(--navy-bright)}
.metric.olive .v{color:var(--olive)}
.metric .bar{height:3px;background:var(--rule);margin-top:14px;position:relative;overflow:hidden}
.metric .bar::after{content:"";position:absolute;top:0;left:0;bottom:0;background:linear-gradient(90deg,var(--navy),var(--navy-bright));width:var(--p,40%)}
.metric.alt .bar::after{background:linear-gradient(90deg,var(--gold-dim),var(--gold))}
.metric.olive .bar::after{background:linear-gradient(90deg,var(--olive),var(--olive-bright))}
.ba-grid{display:grid;grid-template-columns:1fr;gap:20px}
.ba-card{display:grid;grid-template-columns:1fr 110px 1fr;gap:0;border:1px solid var(--rule-2);background:var(--paper-2);overflow:hidden;box-shadow:0 1px 0 rgba(12,24,67,.03)}
.ba-card .side{padding:22px 24px;display:flex;flex-direction:column;gap:10px}
.ba-card .before{background:#eef1f7;border-right:1px solid var(--rule)}
.ba-card .after{background:#f0f4fd;border-left:1px solid var(--rule)}
.ba-card .divider{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:var(--paper-2);padding:14px 6px;border-left:1px solid var(--rule);border-right:1px solid var(--rule)}
.ba-card .divider .arrow{font-family:'Cormorant Garamond',serif;font-size:42px;color:var(--navy);line-height:1}
.ba-card .divider .delta{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--gold);letter-spacing:.04em;text-align:center;line-height:1.3;font-weight:500}
.ba-card .label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.22em;text-transform:uppercase;font-weight:500}
.ba-card .before .label{color:var(--before)}
.ba-card .after .label{color:var(--gold)}
.ba-card .who{font-family:'Cormorant Garamond',serif;font-size:23px;font-weight:600;color:var(--navy-deep)}
.ba-card .quote{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16.5px;line-height:1.48;color:var(--ink-dim);padding-left:12px;border-left:2px solid var(--before)}
.ba-card .after .quote{border-left-color:var(--gold);color:var(--ink)}
.ba-card .meta{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink-faint);letter-spacing:.06em;margin-top:auto;padding-top:8px}
.ba-card .tone{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10px;padding:4px 9px;border:1px solid var(--rule-2);border-radius:2px;color:var(--ink-dim);letter-spacing:.12em;text-transform:uppercase;margin-top:4px;width:fit-content;background:var(--paper-2)}
.ba-card .after .tone{color:var(--gold);border-color:var(--gold)}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:22px}
.chip{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;font-weight:500;padding:7px 12px;border:1px solid var(--rule-2);background:var(--paper-2);color:var(--ink-dim);cursor:pointer;transition:all .15s ease}
.chip:hover{color:var(--navy);border-color:var(--navy-bright);background:#eef1fc}
.chip.on{background:var(--navy);color:var(--paper-2);border-color:var(--navy)}
.chip .ct{opacity:.55;margin-left:6px}
table.data{width:100%;border-collapse:collapse;font-family:'Libre Franklin',sans-serif;font-size:13.5px;margin-top:6px;background:var(--paper-2);border:1px solid var(--rule-2);box-shadow:0 1px 0 rgba(12,24,67,.03)}
table.data thead th{text-align:left;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-dim);font-weight:500;padding:13px 16px;border-bottom:2px solid var(--navy);cursor:pointer;user-select:none;white-space:nowrap;background:var(--paper)}
table.data thead th:hover{color:var(--navy);background:var(--rule-2)}
table.data thead th .sort{margin-left:6px;opacity:.5;font-size:10px}
table.data thead th.sorted{color:var(--navy);background:var(--rule-2)}
table.data thead th.sorted .sort{opacity:1;color:var(--gold)}
table.data tbody td{padding:12px 16px;border-bottom:1px solid var(--rule);color:var(--ink-dim);vertical-align:middle}
table.data tbody tr:hover td{background:#fafaf4;color:var(--ink)}
table.data tbody tr:last-child td{border-bottom:none}
table.data td.num{font-family:'IBM Plex Mono',monospace;font-size:12.5px;text-align:right;color:var(--ink)}
table.data td.handle{font-family:'IBM Plex Mono',monospace;color:var(--navy);font-size:13px;font-weight:500}
.pct{display:inline-flex;align-items:center;gap:8px;min-width:150px}
.pct .pbar{flex:1;height:8px;background:#ebeef4;border:1px solid var(--rule);position:relative;overflow:hidden;min-width:60px}
.pct .pbar i{position:absolute;top:0;bottom:0;left:0;background:linear-gradient(90deg,var(--gold-dim),var(--gold))}
.pct.new .pbar i{background:linear-gradient(90deg,var(--olive),var(--olive-bright))}
.pct.con .pbar i{background:linear-gradient(90deg,var(--navy),var(--navy-bright))}
.pct .val{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--gold);min-width:70px;text-align:right;font-weight:500}
.pct.new .val{color:var(--olive)}
.pct.con .val{color:var(--navy)}
.prof-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.prof{border:1px solid var(--rule-2);background:var(--paper-2);padding:20px 22px;cursor:pointer;transition:all .18s ease;position:relative;overflow:hidden;box-shadow:0 1px 0 rgba(12,24,67,.03)}
.prof::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--navy);opacity:0;transition:opacity .2s}
.prof:hover{border-color:var(--navy-bright);box-shadow:0 4px 16px rgba(12,24,67,.08)}
.prof:hover::before{opacity:1}
.prof.open{background:#f5f4ef;border-color:var(--navy)}
.prof.open::before{opacity:1;background:var(--gold)}
.prof .row1{display:flex;align-items:center;gap:12px}
.prof .avatar{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--paper-2);background:linear-gradient(135deg, var(--navy-bright), var(--navy));flex-shrink:0;border:1px solid var(--navy-deep)}
.prof .who{display:flex;flex-direction:column}
.prof .handle{font-family:'IBM Plex Mono',monospace;font-size:13.5px;color:var(--navy);letter-spacing:.02em;font-weight:500}
.prof .flw{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink-faint);margin-top:2px;letter-spacing:.04em}
.prof .role{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15.5px;color:var(--ink-dim);margin-top:14px;line-height:1.38}
.prof .typology{margin-top:12px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:500;padding:5px 9px;background:var(--paper);color:var(--gold-dim);border:1px solid var(--rule-2);width:fit-content}
.prof-detail{grid-column:1 / -1;border:1px solid var(--navy);background:#f5f4ef;padding:30px 34px;margin-top:-2px;display:grid;grid-template-columns:1fr 300px;gap:30px;border-top:3px solid var(--gold)}
.prof-detail h3{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;margin:0 0 4px;color:var(--navy-deep);letter-spacing:-.01em}
.prof-detail .dsub{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--gold);letter-spacing:.22em;text-transform:uppercase;margin-bottom:18px;font-weight:500}
.prof-detail .tline{border-left:2px solid var(--rule-2);padding-left:20px;margin-left:4px;display:flex;flex-direction:column;gap:16px}
.prof-detail .tpt{position:relative}
.prof-detail .tpt::before{content:"";position:absolute;left:-26px;top:6px;width:10px;height:10px;border-radius:50%;background:var(--navy);border:2px solid #f5f4ef}
.prof-detail .tpt .date{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--navy);letter-spacing:.1em;font-weight:500}
.prof-detail .tpt .txt{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;line-height:1.5;color:var(--ink);margin-top:4px}
.prof-detail .tpt .lnk{display:block;margin-top:4px;font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--gold)}
.prof-detail .kpanel{border-left:1px solid var(--rule-2);padding-left:24px}
.prof-detail .kpanel .lab{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);font-weight:500}
.prof-detail .kpanel .v{font-family:'Cormorant Garamond',serif;font-size:34px;color:var(--navy-deep);font-weight:600;line-height:1;margin-top:4px;letter-spacing:-.01em}
.prof-detail .kpanel .sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-dim);margin-top:6px;margin-bottom:18px}
.spine{position:relative;padding-left:0;background:var(--paper-2);border:1px solid var(--rule-2);padding:8px 24px}
.spine::before{content:"";position:absolute;left:134px;top:16px;bottom:16px;width:2px;background:linear-gradient(180deg, var(--navy) 0%, var(--navy-bright) 60%, var(--warn) 100%)}
.spine .day{display:grid;grid-template-columns:100px 30px 1fr;gap:0;align-items:start;padding:16px 0;border-bottom:1px dashed var(--rule)}
.spine .day:last-child{border-bottom:none}
.spine .day .d{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--navy);letter-spacing:.14em;text-transform:uppercase;padding-top:4px;font-weight:500}
.spine .day .d b{display:block;font-family:'Cormorant Garamond',serif;font-size:27px;font-weight:600;color:var(--navy-deep);letter-spacing:-.01em;text-transform:none;line-height:1}
.spine .day .node{display:flex;align-items:center;justify-content:center;padding-top:8px}
.spine .day .node i{display:block;width:14px;height:14px;border-radius:50%;background:var(--paper-2);border:2px solid var(--navy);box-shadow:0 0 0 3px var(--paper-2)}
.spine .day.gaza .node i{border-color:var(--warn);background:var(--warn)}
.spine .day.ext .node i{border-color:var(--gold);background:var(--gold)}
.spine .day.sync{background:linear-gradient(90deg, rgba(119,149,204,.12) 0%, rgba(119,149,204,0) 70%)}
.spine .day.sync .node i{border-color:var(--gold-bright);background:var(--gold-bright);box-shadow:0 0 0 3px var(--paper-2), 0 0 16px rgba(119,149,204,.55)}
.spine .day.sync .loc{color:var(--gold-dim)}
.spine .day.sync .loc::after{content:" \2022 CONVERGENCE WINDOW";font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.22em;color:var(--gold);margin-left:10px;vertical-align:middle;font-weight:500}
.spine .day .body{padding:4px 0 4px 18px}
.spine .day .loc{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--navy-deep);line-height:1.25}
.spine .day.gaza .loc{color:var(--warn)}
.spine .day .act{font-size:13.5px;color:var(--ink-dim);margin-top:5px;line-height:1.55}
.spine .day .att{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.spine .day .att span{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--navy);padding:3px 8px;background:var(--paper);border:1px solid var(--rule-2);letter-spacing:.04em;font-weight:500}
.gaza-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.gaza-card{border:1px solid var(--rule-2);background:var(--paper-2);padding:22px 24px;position:relative;box-shadow:0 1px 0 rgba(12,24,67,.03);border-top:3px solid var(--warn)}
.gaza-card::before{content:attr(data-tag);position:absolute;top:-3px;left:-1px;padding:4px 11px;background:var(--warn);color:var(--paper-2);font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.22em;font-weight:600}
.gaza-card .who{font-family:'IBM Plex Mono',monospace;font-size:13.5px;color:var(--navy);margin-top:26px;font-weight:500}
.gaza-card .title{font-family:'Cormorant Garamond',serif;font-size:23px;font-weight:600;color:var(--navy-deep);line-height:1.22;margin-top:6px;letter-spacing:-.01em}
.gaza-card .finds{display:flex;flex-direction:column;gap:12px;margin-top:18px}
.gaza-card .f{display:flex;gap:12px;align-items:flex-start}
.gaza-card .f .num{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold);font-weight:600;line-height:1;min-width:28px}
.gaza-card .f .tx{font-size:13.5px;color:var(--ink-dim);line-height:1.5}
.gaza-card .tweets{margin-top:20px;padding-top:16px;border-top:1px solid var(--rule);display:flex;flex-direction:column;gap:10px}
.gaza-card .tw{display:flex;gap:10px;align-items:baseline}
.gaza-card .tw .dt{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--warn);min-width:54px;font-weight:500}
.gaza-card .tw .qt{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14.5px;color:var(--ink);line-height:1.42;flex:1}
.gaza-card .tw .ln{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--gold)}
.typ-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.typ{border:1px solid var(--rule-2);background:var(--paper-2);padding:24px 26px;position:relative;overflow:hidden;box-shadow:0 1px 0 rgba(12,24,67,.03);transition:box-shadow .18s}
.typ:hover{box-shadow:0 4px 14px rgba(12,24,67,.07)}
.typ::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--gold)}
.typ.navy::before{background:var(--navy)}
.typ.olive::before{background:var(--olive-bright)}
.typ.warn::before{background:var(--warn)}
.typ.ink::before{background:var(--navy-deep)}
.typ .num{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-faint);letter-spacing:.2em;font-weight:500}
.typ h3{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:28px;margin:6px 0 8px;color:var(--navy-deep);line-height:1.08;letter-spacing:-.01em}
.typ .arc{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15.5px;color:var(--gold);margin-bottom:12px}
.typ .tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.typ .tag-row span{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--navy);padding:4px 9px;background:var(--paper);border:1px solid var(--rule-2);font-weight:500}
.typ .desc{font-size:13.5px;color:var(--ink-dim);line-height:1.6}
.aw-wrap{display:grid;grid-template-columns:340px 1fr;gap:24px}

function Quant(){
  const [sort,setSort] = useState({k:"f",d:-1});
  const rows = useMemo(()=>{
    const r = [...QUANT];
    r.sort((a,b)=>{
      const av = sort.k==="pct" ? (a.pct===null ? -1 : a.pct) : a[sort.k];
      const bv = sort.k==="pct" ? (b.pct===null ? -1 : b.pct) : b[sort.k];
      if (typeof av === "string") return av.localeCompare(bv)*sort.d;
      return (av-bv)*sort.d;
    });
    return r;
  },[sort]);
  const toggle = (k)=> setSort(s => s.k===k ? {k, d:-s.d} : {k, d:-1});
  const hdr = (k, label) => (
    <th className={sort.k===k?"sorted":""} onClick={()=>toggle(k)}>
      {label}<span className="sort">{sort.k===k ? (sort.d===-1?"↓":"↑") : "↕"}</span>
    </th>
  );
  return (
    <section id="quant">
      <SectionHead n="03" title="Reach & Engagement" note="Sortable · click any column header. Views reflect posts surveyed in source index; podcast metrics are episode-level where X-shared."/>
      <table className="data">
        <thead>
          <tr>
            {hdr("h","Matched Phrase")}
            {hdr("f","Combined Reach")}
            {hdr("b","Piker Top Post")}
            {hdr("d","Carlson Top Post")}
            {hdr("a","\u2014")}
            {hdr("tot","Total")}
            {hdr("pct","Direction")}
          </tr>
        </thead>
        <tbody>
          {rows.map(r =>
            <tr key={r.h}>
              <td className="handle">{r.h}</td>
              <td className="num">{r.f > 0 ? r.f.toLocaleString() : "\u2014"}</td>
              <td className="num">{r.b > 0 ? r.b.toLocaleString() : "\u2014"}</td>
              <td className="num">{r.d > 0 ? r.d.toLocaleString() : "\u2014"}</td>
              <td className="num">{"\u2014"}</td>
              <td className="num" style={{color:"var(--gold)",fontWeight:500}}>{r.tot > 0 ? r.tot.toLocaleString() : "\u2014"}</td>
              <td>
                <div className={"pct " + (r.kind==="new"?"new":r.kind==="con"?"con":"")}>
                  <div className="pbar"><i style={{width: "75%"}}/></div>
                  <div className="val">{r.label}</div>
                </div>
              </td>
            </tr>
          )}
        </tbody>
      </table>
    </section>
  );
}

function Profiles(){
  const [open,setOpen] = useState(null);
  const openProfile = open !== null ? PROFILES.find(p => p.h === open) : null;
  const openIndex = open !== null ? PROFILES.findIndex(p => p.h === open) : -1;
  const rowOf = i => Math.floor(i/3);
  const openRow = openIndex >= 0 ? rowOf(openIndex) : -1;
  return (
    <section id="profiles">
      <SectionHead n="04" title="The Two Poles" note="Click a card to expand. Each profile lists the figure's chronological verbatim-match timeline."/>
      <div className="prof-grid">
        {PROFILES.map((p,i) => {
          const card = (
            <div key={p.h} className={"prof " + (open===p.h ? "open":"")} onClick={()=>setOpen(open===p.h ? null : p.h)}>
              <div className="row1">
                <div className="avatar">{INITIALS[p.h]||"??"}</div>
                <div className="who">
                  <div className="handle">{p.h}</div>
                  <div className="flw">{p.followers.toLocaleString()} followers</div>
                </div>
              </div>
              <div className="role">{p.role}</div>
              <div className="typology">{p.typology}</div>
            </div>
          );
          const nodes = [card];
          if (openProfile && openRow === rowOf(i) && ((i+1) % 3 === 0 || i === PROFILES.length-1)){
            nodes.push(
              <div key={"d-"+i} className="prof-detail">
                <div>
                  <h3>{openProfile.h}</h3>
                  <div className="dsub">{openProfile.typology}</div>
                  <p style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:"17.5px",lineHeight:"1.5",color:"var(--ink-dim)",margin:"0 0 24px",borderLeft:"2px solid var(--gold)",paddingLeft:"16px"}}>{openProfile.headline}</p>
                  <div className="tline">
                    {openProfile.timeline.map((t,j) =>
                      <div key={j} className="tpt">
                        <div className="date">{t.date}</div>
                        <div className="txt">"{t.text}"</div>
                        {t.url && <a className="lnk" href={t.url} target="_blank" rel="noreferrer">view source ↗</a>}
                      </div>
                    )}
                  </div>
                </div>
                <div className="kpanel">
                  <div className="lab">X Followers</div>
                  <div className="v">{openProfile.followers.toLocaleString()}</div>
                  <div className="sub">reach floor</div>
                  <div className="lab">Role in the Horseshoe</div>
                  <div className="sub" style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:"15.5px",color:"var(--gold)",marginTop:4,marginBottom:20,fontWeight:500}}>{openProfile.career}</div>
                  <div className="lab">Timeline entries</div>
                  <div className="v">{openProfile.timeline.length}</div>
                  <div className="sub">primary-source events surveyed</div>
                </div>
              </div>
            );
          }
          return nodes;
        })}
      </div>
    </section>
  );
}

function Itinerary(){
  return (

      <SectionHead n="05" title="Convergence Timeline" note="Every matched phrase in chronological order. Piker is the left pole; Carlson is the right pole. Highlighted: same-day convergence (Apr 9, 2026)."/>
      <div className="spine">
        {ITINERARY.map((d,i)=>
          <div key={i} className={"day " + (d.gaza?"gaza ":"") + (d.ext?"ext ":"") + (d.sync?"sync ":"")}>

            <div className="node"><i/></div>
            <div className="body">
              <div className="loc">{d.loc}</div>

function Gaza(){

    <section id="gaza">
      <SectionHead n="06" title="The Target of Both" note="The matched phrases do not range across foreign policy — they cluster on one subject. Two summary cards below."/>
      <div className="headline" style={{borderColor:"var(--warn)",background:"#fbf5f4"}}>
        <div className="dek">Seven phrases, one subject, two poles: the horseshoe closes on Israel. Neither figure is alone in using any single phrase — but the overlap is not on Russia, China, Venezuela, or any other foreign-policy issue. It is only on this one.</div>
        <div className="byline">ALL QUOTES PRIMARY-SOURCE · TWEETS + NAMED EPISODES · INDEXED IN SOURCES 01\u201316</div>
      </div>
      <div className="gaza-grid">
        {GAZA.map(g =>
          <div key={g.h} className="gaza-card" data-tag={g.tag}>

            <div className="finds">

            <div className="tweets">
              {g.tweets.map((t,i)=>

function Typology(){
  return (
    <section id="typology">
      <SectionHead n="07" title="Phrase Typology" note="Six categories of matched phrase across the two figures. Each type groups the tweets, episodes, and podcast passages that deploy the same rhetorical move."/>
      <div className="typ-grid">
        {TYPOLOGY.map((t,i)=>
          <div key={i} className={"typ " + t.kind}>
            <div className="num">TYPE {t.num}</div>
            <h3>{t.name}</h3>
            <div className="arc">{t.arc}</div>

function AntiWoke(){
  return (
    <section id="antiwoke">
      <SectionHead n="08" title="The Convergence" note="Left column quantifies the pattern. Right column is a representative-quote feed alternating Piker → Carlson."/>
      <div className="headline" style={{borderColor:"var(--warn)",background:"#fbf5f4"}}>
        <div className="dek">Same words. Same order. Same target. One pole calls the other cattle. The other pole endorsed a candidate the first pole despises. And yet: the seven phrases below are traceable across both voices, first on the left, then on the right, within roughly a 14-month lag.</div>
        <div className="byline">PRIMARY SOURCES · DATES/VIEWS/TIMESTAMPS PRESERVED · FEED ORDERED TO ILLUSTRATE THE ECHO</div>
      </div>
      <div className="aw-wrap">
        <div className="aw-stat">
          <h4>Volume &amp; Events</h4>
          {AW_STATS.map((s,i)=><div key={i} className="row"><div className="n">{s.n}</div><div className="v">{s.v}</div></div>)}
        </div>
        <div className="aw-feed">
          {AW_FEED.map((f,i)=>
            <div key={i} className="aw-item">
              <div className="meta">{f.meta}</div>
              <div className="q">"{f.q}"</div>

function Sustained(){
  return (
    <section id="sustained">
      <SectionHead n="09" title="Media Ecosystem" note="The channels and formats that carry the matched language. Livestream → clipped X post → podcast guest spot → mainstream-adjacent podcast → edited episode title → same-day echo."/>
      <div className="sust-rail">
        <div className="sust-pts">
          {SUSTAINED_PTS.map((p,i)=>

        {SUSTAINED_CARDS.map((c,i)=>

function Quotes(){
  const [filter,setFilter] = useState("All");
  const visible = filter==="All" ? QUOTES : QUOTES.filter(q => q.theme===filter);
  const counts = useMemo(()=> {
    const c = {All:QUOTES.length};
    QUOTES.forEach(q => { c[q.theme] = (c[q.theme]||0)+1 });
    return c;
  },[]);
  return (
    <section id="quotes">
      <SectionHead n="10" title="Key Quotes" note="Filterable pull-quote grid. Click a theme to filter. Each pair typically shows a Piker quote then the matching Carlson quote."/>
      <div className="chip-row">
        {QUOTE_THEMES.map(t => <div key={t} className={"chip " + (filter===t?"on":"")} onClick={()=>setFilter(t)}>{t}<span className="ct">{counts[t]||0}</span></div>)}
      </div>
      <div className="q-grid">
        {visible.map((q,i) =>
          <div key={i} className="q-card">
            <div className="top">
              <div className="avatar">{INITIALS[q.h]||"?"}</div>
              <div className="meta">
                <div className="h">{q.h}</div>
                <div className="d">{q.date}</div>
              </div>
              <div className="theme">{q.theme}</div>
            </div>
            <div className="q">"{q.q}"</div>
            <div className="bot">
              <span className="lnk" style={{opacity:.7}}>source in index</span>
              <span className="vstat">● PRIMARY</span>
            </div>
          </div>
        )}
      </div>
    </section>
  );
}

function Verification(){
  const [sort,setSort] = useState({k:"n",d:-1});
  const rows = useMemo(()=>{
    const r = [...VER_TABLE];
    r.sort((a,b)=>{
      const av = a[sort.k], bv = b[sort.k];
      if (typeof av === "string") return av.localeCompare(bv)*sort.d;
      return (av-bv)*sort.d;
    });
    return r;
  },[sort]);
  const toggle = k => setSort(s => s.k===k ? {k,d:-s.d} : {k,d:-1});
  const hdr = (k,l) => <th className={sort.k===k?"sorted":""} onClick={()=>toggle(k)}>{l}<span className="sort">{sort.k===k ? (sort.d===-1?"↓":"↑") : "↕"}</span></th>;
  return (
    <section id="verification">
      <SectionHead n="11" title="Methodology & Sources" note="Verbatim-match definition: exact or near-exact phrase string (word-stem identity, same modifiers, same noun head). Framework applied to two figures across X posts and named podcast episodes, Oct 2023 – Apr 2026. Sources 01–16 indexed below."/>
      <div className="ver-head">
        <div className="kb"><div className="k">Figures analyzed</div><div className="v">2</div><div className="s">Hasan Piker · Tucker Carlson</div></div>
        <div className="kb"><div className="k">Verbatim matches</div><div className="v">7</div><div className="s">six exact · one near-exact (apartheid state / system)</div></div>
        <div className="kb"><div className="k">Primary sources</div><div className="v">16</div><div className="s">12 tweets + 4 podcast episodes</div></div>
        <div className="kb"><div className="k">Data range</div><div className="v" style={{fontSize:"22px"}}>30 months</div><div className="s">Oct 10, 2023 → Apr 9, 2026</div></div>
      </div>
      <h4 style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:"11px",letterSpacing:".22em",textTransform:"uppercase",color:"var(--navy)",margin:"22px 0 12px",fontWeight:600}}>Per-Entity Coverage</h4>
      <table className="data">
        <thead>
          <tr>
            {hdr("h","Entity")}
            {hdr("n","Cited Items")}
            {hdr("s","Status")}
            {hdr("note","Notes")}
          </tr>
        </thead>
        <tbody>
          {rows.map(r =>
            <tr key={r.h}>
              <td className="handle">{r.h}</td>
              <td className="num" style={{color: r.n>0?"var(--olive)":"var(--ink-faint)", fontWeight:500}}>{r.n}</td>
              <td><span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:"11px",color: r.s==="Analyzed"?"var(--olive)":"var(--warn)",letterSpacing:".12em",fontWeight:500}}>{r.s==="Analyzed" ? "\u25CF" : "\u25CB"} {r.s.toUpperCase()}</span></td>
              <td>{r.note}</td>
            </tr>
          )}
        </tbody>
      </table>
      <h4 style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:"11px",letterSpacing:".22em",textTransform:"uppercase",color:"var(--navy)",margin:"34px 0 12px",fontWeight:600}}>Sources &amp; References</h4>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2, 1fr)",gap:"10px",marginBottom:"20px"}}>
        {SOURCES.map(s =>
          <div key={s.n} style={{border:"1px solid var(--rule-2)",background:"var(--paper-2)",padding:"14px 16px",display:"grid",gridTemplateColumns:"30px 1fr",gap:"12px"}}>
            <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:"11px",color:"var(--gold)",letterSpacing:".12em",fontWeight:600}}>{s.n}</div>
            <div>
              <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:"10.5px",color:"var(--navy)",letterSpacing:".14em",textTransform:"uppercase",fontWeight:500}}>{s.pub}</div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"18px",color:"var(--navy-deep)",fontWeight:600,lineHeight:1.2,margin:"3px 0 5px"}}>{s.title}</div>
              <div style={{fontSize:"12.5px",color:"var(--ink-dim)",lineHeight:1.5}}>{s.desc}</div>
            </div>
          </div>
        )}
      </div>
      <div className="limits">
        <h4>Limitations</h4>
        <ol>
          <li><b>Verbatim standard:</b> This report classifies \u2018apartheid state\u2019 vs. \u2018apartheid system\u2019 as a 90%+ near-match (shared root, same categorical function). Stricter word-sequence standards would drop that pair.</li>
          <li><b>Podcast attribution:</b> Several Carlson-side matches are spoken by guests on the Tucker Carlson Show rather than by Carlson himself. Their inclusion is justified by Carlson\u2019s framing, episode titling, and clip-selection behavior \u2014 but is an interpretive choice.</li>
          <li><b>Direction of causation:</b> The report documents a consistent time order (Piker \u2192 Carlson) but does not claim a transmission mechanism. Common causes (Gaza war coverage, X algorithm, shared podcast guests) are plausible alternatives to direct uptake.</li>
          <li><b>Selection:</b> The matched phrases are the cleanest exact hits in 30 months of output. They are not a random sample of either figure\u2019s Israel discourse; rarer phrases and one-off formulations are omitted.</li>
          <li><b>Engagement metrics:</b> View counts are captured at time of indexing and may have drifted since. Podcast episode views are X-shared counts where available, not total podcast plays.</li>
          <li><b>Interpretive characterizations</b> (\u2018horseshoe,\u2019 \u2018convergence,\u2019 \u2018vocabulary transfer\u2019) are this report\u2019s framing. The verbatim phrases themselves stand on their own.</li>
        </ol>
      </div>
    </section>
  );
}

function App(){
  const [active,setActive] = useState("dashboard");
  useEffect(()=>{
    const obs = new IntersectionObserver((entries)=>{
      entries.forEach(e => { if (e.isIntersecting) setActive(e.target.id); });
    }, { rootMargin:"-20% 0px -70% 0px", threshold:0 });
    SECTIONS.forEach(s => { const el = document.getElementById(s.id); if (el) obs.observe(el); });
    return () => obs.disconnect();
  },[]);

  const jump = (id) => {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({behavior:"smooth",block:"start"});
    setActive(id);
  };

  return (
    <div className="layout">
      <SidebarNav active={active} onJump={jump}/>
      <main>
        <Dashboard/>
        <BeforeAfter/>
        <Quant/>
        <Profiles/>
        <Itinerary/>
        <Gaza/>
        <Typology/>
        <AntiWoke/>
        <Sustained/>
        <Quotes/>
        <Verification/>
        <footer>
          THE HORSESHOE EFFECT \u00B7 VINE &amp; FIG TREE INSTITUTE \u00B7 APR 24, 2026<br/>
          PRIMARY X POSTS + 4 NAMED PODCAST EPISODES \u00B7 7 VERBATIM OR NEAR-VERBATIM PHRASE MATCHES \u00B7 30-MONTH FRAME<br/>
          SLOW WORK OF PLACE \u00B7 HUDSON VALLEY \u00B7 INVESTIGATIVE METHOD \u00B7 SOURCE-TRIANGULATED
        </footer>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
