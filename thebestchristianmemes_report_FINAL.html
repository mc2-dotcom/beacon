<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>@thebestchristianmemes — Vine &amp; Fig Tree Institute</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=IBM+Plex+Mono:wght@300;400;500;600&family=Libre+Franklin:wght@300;400;500;600;700&display=swap" />
<style>
:root{
  /* VFT brand palette — Vine & Fig Tree Institute */
  --paper:#F6F2ED;
  --paper-2:#FCFFFF;
  --paper-3:#F0ECE4;
  --ink:#0C1843;
  --ink-dim:#3A4DA7;
  --ink-faint:#5B6484;
  --rule:#C8CCD8;
  --rule-2:#D4E3FC;
  --gold:#3A4DA7;
  --gold-bright:#7795CC;
  --gold-dim:#1B2866;
  --navy:#0C1843;
  --navy-bright:#3A4DA7;
  --navy-deep:#0C1843;
  --olive:#5B6484;
  --olive-bright:#7795CC;
  --before:#5B6484;
  --after:#3A4DA7;
  --warn:#8B2635;
  --chip:#F6F2ED;
  --chip-hot:#D4E3FC;
  --sidebar:#F6F2ED;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:'Libre Franklin',system-ui,sans-serif;font-weight:400;-webkit-font-smoothing:antialiased;letter-spacing:.005em}
body{
  background-image:
    radial-gradient(1200px 600px at 20% -10%, rgba(119,149,204,.08), transparent 60%),
    radial-gradient(900px 500px at 100% 10%, rgba(12,24,67,.05), transparent 60%);
}
a{color:var(--navy);text-decoration:none;border-bottom:1px dotted var(--navy-bright)}
a:hover{color:var(--gold);border-bottom-color:var(--gold)}
.mono{font-family:'IBM Plex Mono',ui-monospace,monospace;letter-spacing:.02em}
.serif{font-family:'Cormorant Garamond',Georgia,serif}
.caps{text-transform:uppercase;letter-spacing:.22em;font-size:11px}
.hairline{border-top:1px solid var(--rule)}
.layout{display:grid;grid-template-columns:260px 1fr;min-height:100vh}

/* Sidebar */
aside.nav{
  position:sticky;top:0;height:100vh;overflow-y:auto;
  padding:28px 22px 40px;border-right:1px solid var(--rule);
  background:var(--sidebar);
}
.brandmark{display:flex;flex-direction:column;gap:4px;margin-bottom:22px}
.brandmark .kicker{color:var(--navy);font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.32em;text-transform:uppercase;font-weight:500}
.brandmark .title{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:22px;line-height:1.1;color:var(--navy-deep);letter-spacing:-.01em;overflow-wrap:anywhere;word-break:break-word}
.brandmark .sub{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink-faint);letter-spacing:.08em;margin-top:6px}
.seal{
  margin:14px 0 22px;padding:12px 14px;border:1px solid var(--rule-2);border-left:3px solid var(--navy);
  background:var(--paper-2);font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-dim);line-height:1.65
}
.seal b{color:var(--navy);font-weight:600}
nav.sections{display:flex;flex-direction:column;gap:2px;margin-top:8px}
nav.sections button{
  all:unset;cursor:pointer;padding:9px 10px 9px 14px;display:flex;align-items:baseline;gap:10px;
  font-family:'Libre Franklin',sans-serif;font-size:13px;color:var(--ink-dim);font-weight:400;
  border-left:2px solid transparent;transition:all .15s ease;
}
nav.sections button:hover{color:var(--navy);background:rgba(12,24,67,.04);border-left-color:var(--gold)}
nav.sections button.active{color:var(--navy-deep);border-left-color:var(--navy);background:rgba(12,24,67,.06);font-weight:500}
nav.sections .num{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-faint);min-width:20px}
nav.sections button.active .num{color:var(--gold)}
.nav-foot{margin-top:28px;padding-top:18px;border-top:1px solid var(--rule-2);font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-faint);line-height:1.7}
.nav-foot .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--olive-bright);margin-right:6px;vertical-align:middle;box-shadow:0 0 8px rgba(119,149,204,.6)}

/* Main */
main{padding:48px 56px 120px;max-width:1180px}
section{margin-bottom:86px;scroll-margin-top:24px}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:26px;padding-bottom:14px;border-bottom:1px solid var(--rule-2)}
.section-head .h-left{display:flex;flex-direction:column;gap:4px}
.section-head .tag{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--navy);letter-spacing:.28em;text-transform:uppercase;font-weight:500}
.section-head h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:40px;line-height:1.02;margin:0;color:var(--navy-deep);letter-spacing:-.01em}
.section-head .h-right{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-faint);text-align:right;letter-spacing:.04em;max-width:340px;line-height:1.65}

/* Headline block */
.headline{
  border:1px solid var(--rule-2);padding:30px 34px;margin-bottom:40px;
  background:var(--paper-2);
  position:relative;overflow:hidden;box-shadow:0 1px 0 rgba(12,24,67,.04)
}
.headline::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg, var(--navy) 0%, var(--navy-bright) 55%, var(--gold-bright) 100%)}
.headline .dek{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;line-height:1.45;color:var(--navy-deep);max-width:900px}
.headline .byline{margin-top:16px;font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink-faint);letter-spacing:.08em}

/* Metric cards */
.grid-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.metric{
  border:1px solid var(--rule);padding:20px 20px 18px;background:var(--paper-2);
  position:relative;transition:all .18s ease;cursor:default;box-shadow:0 1px 0 rgba(12,24,67,.03)
}
.metric:hover{border-color:var(--navy-bright);transform:translateY(-1px);box-shadow:0 4px 16px rgba(12,24,67,.08)}
.metric .k{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-faint);letter-spacing:.18em;text-transform:uppercase;font-weight:500}
.metric .v{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:46px;line-height:1;margin-top:10px;color:var(--navy-deep);letter-spacing:-.015em}
.metric .u{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-dim);margin-top:8px;letter-spacing:.03em;line-height:1.5}
.metric.alt .v{color:var(--gold)}
.metric.navy .v{color:var(--navy-bright)}
.metric.olive .v{color:var(--olive)}
.metric .bar{height:3px;background:var(--rule);margin-top:14px;position:relative;overflow:hidden}
.metric .bar::after{content:"";position:absolute;top:0;left:0;bottom:0;background:linear-gradient(90deg,var(--navy),var(--navy-bright));width:var(--p,40%)}
.metric.alt .bar::after{background:linear-gradient(90deg,var(--gold-dim),var(--gold))}
.metric.olive .bar::after{background:linear-gradient(90deg,var(--olive),var(--olive-bright))}

/* Before/After cards */
.ba-grid{display:grid;grid-template-columns:1fr;gap:20px}
.ba-card{
  display:grid;grid-template-columns:1fr 110px 1fr;gap:0;
  border:1px solid var(--rule-2);background:var(--paper-2);overflow:hidden;box-shadow:0 1px 0 rgba(12,24,67,.03)
}
.ba-card .side{padding:22px 24px;display:flex;flex-direction:column;gap:10px}
.ba-card .before{background:#eef1f7;border-right:1px solid var(--rule)}
.ba-card .after{background:#f0f4fd;border-left:1px solid var(--rule)}
.ba-card .divider{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:var(--paper-2);padding:14px 6px;border-left:1px solid var(--rule);border-right:1px solid var(--rule)}
.ba-card .divider .arrow{font-family:'Cormorant Garamond',serif;font-size:42px;color:var(--navy);line-height:1}
.ba-card .divider .delta{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--gold);letter-spacing:.04em;text-align:center;line-height:1.3;font-weight:500}
.ba-card .label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.22em;text-transform:uppercase;font-weight:500}
.ba-card .before .label{color:var(--before)}
.ba-card .after .label{color:var(--gold)}
.ba-card .who{font-family:'Cormorant Garamond',serif;font-size:23px;font-weight:600;color:var(--navy-deep)}
.ba-card .quote{font-family:'Cormorant Garamond',serif;font-size:16.5px;line-height:1.48;color:var(--ink-dim);padding-left:12px;border-left:2px solid var(--before)}
.ba-card .after .quote{border-left-color:var(--gold);color:var(--ink)}
.ba-card .meta{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink-faint);letter-spacing:.06em;margin-top:auto;padding-top:8px}
.ba-card .tone{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10px;padding:4px 9px;border:1px solid var(--rule-2);border-radius:2px;color:var(--ink-dim);letter-spacing:.12em;text-transform:uppercase;margin-top:4px;width:fit-content;background:var(--paper-2)}
.ba-card .after .tone{color:var(--gold);border-color:var(--gold)}

.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:22px}
.chip{
  font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;font-weight:500;
  padding:7px 12px;border:1px solid var(--rule-2);background:var(--paper-2);color:var(--ink-dim);cursor:pointer;
  transition:all .15s ease
}
.chip:hover{color:var(--navy);border-color:var(--navy-bright);background:#eef1fc}
.chip.on{background:var(--navy);color:var(--paper-2);border-color:var(--navy)}
.chip .ct{opacity:.55;margin-left:6px}

/* Tables */
table.data{width:100%;border-collapse:collapse;font-family:'Libre Franklin',sans-serif;font-size:13.5px;margin-top:6px;background:var(--paper-2);border:1px solid var(--rule-2);box-shadow:0 1px 0 rgba(12,24,67,.03)}
table.data thead th{
  text-align:left;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-dim);font-weight:500;
  padding:13px 16px;border-bottom:2px solid var(--navy);cursor:pointer;user-select:none;white-space:nowrap;background:var(--paper)
}
table.data thead th:hover{color:var(--navy);background:var(--rule-2)}
table.data thead th .sort{margin-left:6px;opacity:.5;font-size:10px}
table.data thead th.sorted{color:var(--navy);background:var(--rule-2)}
table.data thead th.sorted .sort{opacity:1;color:var(--gold)}
table.data tbody td{padding:12px 16px;border-bottom:1px solid var(--rule);color:var(--ink-dim);vertical-align:middle}
table.data tbody tr:hover td{background:#fafaf4;color:var(--ink)}
table.data tbody tr:last-child td{border-bottom:none}
table.data td.num{font-family:'IBM Plex Mono',monospace;font-size:12.5px;text-align:right;color:var(--ink)}
table.data td.handle{font-family:'IBM Plex Mono',monospace;color:var(--navy);font-size:13px;font-weight:500}
.pct{display:inline-flex;align-items:center;gap:8px;min-width:150px}
.pct .pbar{flex:1;height:8px;background:#ebeef4;border:1px solid var(--rule);position:relative;overflow:hidden;min-width:60px}
.pct .pbar i{position:absolute;top:0;bottom:0;left:0;background:linear-gradient(90deg,var(--gold-dim),var(--gold))}
.pct.new .pbar i{background:linear-gradient(90deg,var(--olive),var(--olive-bright))}
.pct.con .pbar i{background:linear-gradient(90deg,var(--navy),var(--navy-bright))}
.pct .val{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--gold);min-width:70px;text-align:right;font-weight:500}
.pct.new .val{color:var(--olive)}
.pct.con .val{color:var(--navy)}

/* Profile grid */
.prof-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.prof{
  border:1px solid var(--rule-2);background:var(--paper-2);padding:20px 22px;cursor:pointer;
  transition:all .18s ease;position:relative;overflow:hidden;box-shadow:0 1px 0 rgba(12,24,67,.03)
}
.prof::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--navy);opacity:0;transition:opacity .2s}
.prof:hover{border-color:var(--navy-bright);box-shadow:0 4px 16px rgba(12,24,67,.08)}
.prof:hover::before{opacity:1}
.prof.open{background:#f5f4ef;border-color:var(--navy)}
.prof.open::before{opacity:1;background:var(--gold)}
.prof .row1{display:flex;align-items:center;gap:12px}
.prof .avatar{
  width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--paper-2);
  background:linear-gradient(135deg, var(--navy-bright), var(--navy));
  flex-shrink:0;border:1px solid var(--navy-deep)
}
.prof .who{display:flex;flex-direction:column}
.prof .handle{font-family:'IBM Plex Mono',monospace;font-size:13.5px;color:var(--navy);letter-spacing:.02em;font-weight:500}
.prof .flw{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink-faint);margin-top:2px;letter-spacing:.04em}
.prof .role{font-family:'Cormorant Garamond',serif;font-size:15.5px;color:var(--ink-dim);margin-top:14px;line-height:1.38}
.prof .typology{
  margin-top:12px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:500;
  padding:5px 9px;background:var(--paper);color:var(--gold-dim);border:1px solid var(--rule-2);width:fit-content
}
.prof-detail{
  grid-column:1 / -1;border:1px solid var(--navy);background:#f5f4ef;padding:30px 34px;margin-top:-2px;
  display:grid;grid-template-columns:1fr 300px;gap:30px;border-top:3px solid var(--gold)
}
.prof-detail h3{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;margin:0 0 4px;color:var(--navy-deep);letter-spacing:-.01em}
.prof-detail .dsub{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--gold);letter-spacing:.22em;text-transform:uppercase;margin-bottom:18px;font-weight:500}
.prof-detail .tline{border-left:2px solid var(--rule-2);padding-left:20px;margin-left:4px;display:flex;flex-direction:column;gap:16px}
.prof-detail .tpt{position:relative}
.prof-detail .tpt::before{content:"";position:absolute;left:-26px;top:6px;width:10px;height:10px;border-radius:50%;background:var(--navy);border:2px solid #f5f4ef}
.prof-detail .tpt .date{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--navy);letter-spacing:.1em;font-weight:500}
.prof-detail .tpt .txt{font-family:'Cormorant Garamond',serif;font-size:16px;line-height:1.5;color:var(--ink);margin-top:4px}
.prof-detail .tpt .lnk{display:block;margin-top:4px;font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--gold)}
.prof-detail .kpanel{border-left:1px solid var(--rule-2);padding-left:24px}
.prof-detail .kpanel .lab{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);font-weight:500}
.prof-detail .kpanel .v{font-family:'Cormorant Garamond',serif;font-size:34px;color:var(--navy-deep);font-weight:600;line-height:1;margin-top:4px;letter-spacing:-.01em}
.prof-detail .kpanel .sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-dim);margin-top:6px;margin-bottom:18px}

/* Itinerary spine */
.spine{position:relative;padding-left:0;background:var(--paper-2);border:1px solid var(--rule-2);padding:8px 24px}
.spine::before{content:"";position:absolute;left:134px;top:16px;bottom:16px;width:2px;background:linear-gradient(180deg, var(--navy) 0%, var(--navy-bright) 60%, var(--warn) 100%)}
.spine .day{display:grid;grid-template-columns:100px 30px 1fr;gap:0;align-items:start;padding:16px 0;border-bottom:1px dashed var(--rule)}
.spine .day:last-child{border-bottom:none}
.spine .day .d{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--navy);letter-spacing:.14em;text-transform:uppercase;padding-top:4px;font-weight:500}
.spine .day .d b{display:block;font-family:'Cormorant Garamond',serif;font-size:27px;font-weight:600;color:var(--navy-deep);letter-spacing:-.01em;text-transform:none;line-height:1}
.spine .day .node{display:flex;align-items:center;justify-content:center;padding-top:8px}
.spine .day .node i{display:block;width:14px;height:14px;border-radius:50%;background:var(--paper-2);border:2px solid var(--navy);box-shadow:0 0 0 3px var(--paper-2)}
.spine .day.gaza .node i{border-color:var(--warn);background:var(--warn)}
.spine .day.ext .node i{border-color:var(--gold);background:var(--gold)}
.spine .day.sync{background:linear-gradient(90deg, rgba(119,149,204,.12) 0%, rgba(119,149,204,0) 70%)}
.spine .day.sync .node i{border-color:var(--gold-bright);background:var(--gold-bright);box-shadow:0 0 0 3px var(--paper-2), 0 0 16px rgba(119,149,204,.55)}
.spine .day.sync .loc{color:var(--gold-dim)}
.spine .day.sync .loc::after{content:" \2022 ACQUISITION WINDOW";font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.22em;color:var(--gold);margin-left:10px;vertical-align:middle;font-weight:500}
.spine .day .body{padding:4px 0 4px 18px}
.spine .day .loc{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--navy-deep);line-height:1.25}
.spine .day.gaza .loc{color:var(--warn)}
.spine .day .act{font-size:13.5px;color:var(--ink-dim);margin-top:5px;line-height:1.55}
.spine .day .att{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.spine .day .att span{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--navy);padding:3px 8px;background:var(--paper);border:1px solid var(--rule-2);letter-spacing:.04em;font-weight:500}

/* Highlight cards (renamed from Gaza) */
.gaza-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.gaza-card{border:1px solid var(--rule-2);background:var(--paper-2);padding:22px 24px;position:relative;box-shadow:0 1px 0 rgba(12,24,67,.03);border-top:3px solid var(--warn)}
.gaza-card::before{content:attr(data-tag);position:absolute;top:-3px;left:-1px;padding:4px 11px;background:var(--warn);color:var(--paper-2);font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.22em;font-weight:600}
.gaza-card .who{font-family:'IBM Plex Mono',monospace;font-size:13.5px;color:var(--navy);margin-top:26px;font-weight:500}
.gaza-card .title{font-family:'Cormorant Garamond',serif;font-size:23px;font-weight:600;color:var(--navy-deep);line-height:1.22;margin-top:6px;letter-spacing:-.01em}
.gaza-card .finds{display:flex;flex-direction:column;gap:12px;margin-top:18px}
.gaza-card .f{display:flex;gap:12px;align-items:flex-start}
.gaza-card .f .num{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold);font-weight:600;line-height:1;min-width:28px}
.gaza-card .f .tx{font-size:13.5px;color:var(--ink-dim);line-height:1.5}
.gaza-card .tweets{margin-top:20px;padding-top:16px;border-top:1px solid var(--rule);display:flex;flex-direction:column;gap:10px}
.gaza-card .tw{display:flex;gap:10px;align-items:baseline}
.gaza-card .tw .dt{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--warn);min-width:54px;font-weight:500}
.gaza-card .tw .qt{font-family:'Cormorant Garamond',serif;font-size:14.5px;color:var(--ink);line-height:1.42;flex:1}
.gaza-card .tw .ln{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--gold)}

/* Typology */
.typ-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.typ{
  border:1px solid var(--rule-2);background:var(--paper-2);padding:24px 26px;
  position:relative;overflow:hidden;box-shadow:0 1px 0 rgba(12,24,67,.03);transition:box-shadow .18s
}
.typ:hover{box-shadow:0 4px 14px rgba(12,24,67,.07)}
.typ::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--gold)}
.typ.navy::before{background:var(--navy)}
.typ.olive::before{background:var(--olive-bright)}
.typ.warn::before{background:var(--warn)}
.typ.ink::before{background:var(--navy-deep)}
.typ .num{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-faint);letter-spacing:.2em;font-weight:500}
.typ h3{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:28px;margin:6px 0 8px;color:var(--navy-deep);line-height:1.08;letter-spacing:-.01em}
.typ .arc{font-family:'Cormorant Garamond',serif;font-size:15.5px;color:var(--gold);margin-bottom:12px}
.typ .tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.typ .tag-row span{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--navy);padding:4px 9px;background:var(--paper);border:1px solid var(--rule-2);font-weight:500}
.typ .desc{font-size:13.5px;color:var(--ink-dim);line-height:1.6}

/* Anti-pattern / escalation panel */
.aw-wrap{display:grid;grid-template-columns:340px 1fr;gap:24px}
.aw-stat{border:1px solid var(--rule-2);background:var(--paper-2);padding:24px;border-top:3px solid var(--navy);box-shadow:0 1px 0 rgba(12,24,67,.03)}
.aw-stat h4{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--navy);letter-spacing:.22em;text-transform:uppercase;margin:0 0 14px;font-weight:600}
.aw-stat .row{display:flex;justify-content:space-between;align-items:baseline;padding:11px 0;border-bottom:1px dashed var(--rule)}
.aw-stat .row:last-child{border:none}
.aw-stat .row .n{font-family:'Cormorant Garamond',serif;font-size:14.5px;color:var(--ink)}
.aw-stat .row .v{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--gold);font-weight:500}
.aw-feed{display:flex;flex-direction:column;gap:14px}
.aw-item{border-left:3px solid var(--navy);padding:12px 18px;background:var(--paper-2);border-top:1px solid var(--rule);border-right:1px solid var(--rule);border-bottom:1px solid var(--rule);box-shadow:0 1px 0 rgba(12,24,67,.03)}
.aw-item .meta{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--navy);letter-spacing:.08em;margin-bottom:6px;font-weight:500}
.aw-item .q{font-family:'Cormorant Garamond',serif;font-size:16px;line-height:1.5;color:var(--ink)}
.aw-item .targets{margin-top:10px;display:flex;gap:5px;flex-wrap:wrap}
.aw-item .targets span{font-family:'IBM Plex Mono',monospace;font-size:9.5px;padding:3px 8px;background:var(--paper);border:1px solid var(--rule-2);color:var(--gold-dim);letter-spacing:.1em;text-transform:uppercase;font-weight:500}

/* Sustained engagement timeline */
.sust{position:relative;padding:28px 0;margin-top:10px}
.sust-rail{position:relative;height:3px;background:var(--rule);margin:40px 30px}
.sust-rail::before{content:"";position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg, var(--navy) 0%, var(--navy-bright) 50%, var(--gold-bright) 100%)}
.sust-pts{position:relative;height:0}
.sust-pt{position:absolute;transform:translate(-50%, -50%);top:0}
.sust-pt .dot{width:14px;height:14px;border-radius:50%;background:var(--paper-2);border:2px solid var(--navy);margin:0 auto;box-shadow:0 0 0 3px var(--paper-2)}
.sust-pt.hot .dot{border-color:var(--gold);background:var(--gold)}
.sust-pt .lab{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--navy);text-align:center;margin-top:10px;letter-spacing:.06em;font-weight:500}
.sust-pt.hot .lab{color:var(--gold-dim)}
.sust-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:56px}
.sust-card{border:1px solid var(--rule-2);background:var(--paper-2);padding:20px;box-shadow:0 1px 0 rgba(12,24,67,.03)}
.sust-card .date{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--gold);letter-spacing:.14em;text-transform:uppercase;font-weight:500}
.sust-card .who{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--navy);margin-top:4px;font-weight:500}
.sust-card .title{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;color:var(--navy-deep);margin-top:8px;line-height:1.28;letter-spacing:-.01em}
.sust-card .desc{font-size:13.5px;color:var(--ink-dim);line-height:1.55;margin-top:8px}

/* Quote grid */
.q-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.q-card{border:1px solid var(--rule-2);background:var(--paper-2);padding:22px 24px;display:flex;flex-direction:column;gap:14px;transition:all .18s ease;box-shadow:0 1px 0 rgba(12,24,67,.03)}
.q-card:hover{border-color:var(--navy-bright);box-shadow:0 4px 14px rgba(12,24,67,.07)}
.q-card .top{display:flex;align-items:center;gap:12px}
.q-card .avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--navy-bright),var(--navy));display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-weight:600;color:var(--paper-2);font-size:16px;border:1px solid var(--navy-deep)}
.q-card .meta{display:flex;flex-direction:column}
.q-card .meta .h{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--navy);font-weight:500}
.q-card .meta .d{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink-faint);letter-spacing:.06em}
.q-card .theme{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:9.5px;padding:4px 9px;background:var(--paper);border:1px solid var(--rule-2);color:var(--gold-dim);letter-spacing:.14em;text-transform:uppercase;font-weight:500}
.q-card .q{font-family:'Cormorant Garamond',serif;font-size:17px;line-height:1.5;color:var(--ink);position:relative;padding-left:16px;border-left:2px solid var(--gold)}
.q-card .bot{display:flex;justify-content:space-between;align-items:center;margin-top:auto;padding-top:10px;border-top:1px dashed var(--rule)}
.q-card .bot .lnk{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--navy);font-weight:500}
.q-card .bot .vstat{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--olive);letter-spacing:.1em;font-weight:500}

/* Verification */
.ver-head{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.ver-head .kb{border:1px solid var(--rule-2);padding:20px 22px;background:var(--paper-2);border-top:3px solid var(--olive-bright);box-shadow:0 1px 0 rgba(12,24,67,.03)}
.ver-head .kb:nth-child(2){border-top-color:var(--navy)}
.ver-head .kb:nth-child(3){border-top-color:var(--gold)}
.ver-head .kb:nth-child(4){border-top-color:var(--warn)}
.ver-head .kb .k{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink-faint);letter-spacing:.18em;text-transform:uppercase;font-weight:500}
.ver-head .kb .v{font-family:'Cormorant Garamond',serif;font-size:34px;color:var(--olive);font-weight:600;margin-top:4px;line-height:1;letter-spacing:-.01em}
.ver-head .kb:nth-child(2) .v{color:var(--navy-deep)}
.ver-head .kb:nth-child(3) .v{color:var(--gold)}
.ver-head .kb:nth-child(4) .v{color:var(--warn)}
.ver-head .kb .s{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-dim);margin-top:6px}

.limits{border:1px solid var(--rule-2);background:var(--paper-2);padding:24px 28px;margin-top:24px;border-left:3px solid var(--navy);box-shadow:0 1px 0 rgba(12,24,67,.03)}
.limits h4{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--navy);letter-spacing:.22em;text-transform:uppercase;margin:0 0 14px;font-weight:600}
.limits ol{margin:0;padding-left:20px;color:var(--ink-dim);font-size:13.5px;line-height:1.65}
.limits ol li{margin-bottom:8px}
.limits ol li b{color:var(--navy-deep);font-weight:600}

/* Footer */
footer{margin-top:60px;padding-top:28px;border-top:2px solid var(--navy);color:var(--ink-faint);font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.08em;line-height:1.8}

/* Responsive */
@media (max-width: 960px){
  .grid-metrics{grid-template-columns:repeat(2,1fr)}
  .prof-grid{grid-template-columns:repeat(2,1fr)}
  .prof-detail{grid-template-columns:1fr}
  .prof-detail .kpanel{border-left:none;border-top:1px solid var(--rule-2);padding-left:0;padding-top:18px}
  .q-grid,.gaza-grid,.typ-grid{grid-template-columns:1fr}
  .aw-wrap{grid-template-columns:1fr}
  .sust-cards{grid-template-columns:1fr}
  .ver-head{grid-template-columns:repeat(2,1fr)}
}
@media (max-width: 800px){
  .layout{grid-template-columns:1fr}
  aside.nav{position:relative;height:auto;border-right:none;border-bottom:1px solid var(--rule);padding:16px 20px}
  nav.sections{flex-direction:row;flex-wrap:wrap;gap:4px}
  nav.sections button{font-size:11px;padding:6px 10px;border-left:none;border-bottom:2px solid transparent}
  nav.sections button.active{border-left:none;border-bottom-color:var(--gold)}
  main{padding:28px 22px 80px}
  .section-head h2{font-size:28px}
  .section-head{flex-direction:column;align-items:flex-start}
  .section-head .h-right{text-align:left}
  .ba-card{grid-template-columns:1fr}
  .ba-card .before{border-right:none;border-bottom:1px solid var(--rule)}
  .ba-card .after{border-left:none;border-top:1px solid var(--rule)}
  .ba-card .divider{flex-direction:row;border:none;border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);padding:8px}
  .ba-card .divider .arrow{transform:rotate(90deg)}
  table.data{font-size:12px}
  table.data tbody td{padding:8px 10px}
  .spine::before{left:70px}
  .spine .day{grid-template-columns:60px 26px 1fr}
}

/* ============== MOTION CHARTS ============== */
.motion-wrap{border:1px solid var(--rule-2);background:var(--paper-2);padding:34px 38px 30px;box-shadow:0 1px 0 rgba(12,24,67,.03);position:relative;overflow:hidden}
.motion-wrap .mhead{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;margin-bottom:20px;flex-wrap:wrap}
.motion-wrap .mhead h3{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:26px;color:var(--navy-deep);line-height:1.1;margin:0;letter-spacing:-.01em}
.motion-wrap .mhead .mtag{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--gold);letter-spacing:.22em;text-transform:uppercase;font-weight:500}
.motion-wrap .mhead .msub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-faint);letter-spacing:.06em;line-height:1.5;max-width:340px;text-align:right}

/* --- Trajectory line chart --- */
.traj-svg{width:100%;height:auto;display:block;font-family:'IBM Plex Mono',monospace}
.traj-svg .grid{stroke:var(--rule);stroke-width:1;stroke-dasharray:3 3;opacity:0}
.traj-svg .axis-label{font-size:10px;fill:var(--ink-faint);letter-spacing:.06em;text-transform:uppercase}
.traj-svg .month-label{font-size:9.5px;fill:var(--ink-faint);letter-spacing:.04em;text-anchor:middle}
.traj-svg .pre-line,.traj-svg .post-line{fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.traj-svg .pre-line{stroke:var(--navy)}
.traj-svg .post-line{stroke:var(--warn)}
.traj-svg .pre-area{fill:var(--navy);opacity:0;transition:opacity .6s ease}
.traj-svg .post-area{fill:var(--warn);opacity:0;transition:opacity .6s ease}
.traj-svg .pt{r:0;transition:r .25s ease}
.traj-svg .pre-pt{fill:var(--navy);stroke:var(--paper-2);stroke-width:2}
.traj-svg .post-pt{fill:var(--warn);stroke:var(--paper-2);stroke-width:2}
.traj-svg .acq-marker{stroke:var(--gold);stroke-width:1.5;stroke-dasharray:4 3;opacity:0;transition:opacity .8s ease .8s}
.traj-svg .acq-label{font-size:9.5px;fill:var(--gold);font-weight:500;letter-spacing:.16em;opacity:0;transition:opacity .8s ease 1.2s}
.traj-svg .pt-label{font-size:9px;fill:var(--ink-dim);font-weight:500;text-anchor:middle;opacity:0}
.motion-wrap.playing .traj-svg .grid{opacity:1;transition:opacity .4s ease}
.motion-wrap.playing .traj-svg .pre-line{stroke-dasharray:1000;stroke-dashoffset:1000;animation:traj-draw 1.6s ease-out forwards}
.motion-wrap.playing .traj-svg .post-line{stroke-dasharray:1000;stroke-dashoffset:1000;animation:traj-draw 1.4s ease-out 1.6s forwards}
.motion-wrap.playing .traj-svg .pre-area{opacity:.08;transition-delay:.3s}
.motion-wrap.playing .traj-svg .post-area{opacity:.10;transition-delay:1.9s}
.motion-wrap.playing .traj-svg .pt{r:5}
.motion-wrap.playing .traj-svg .acq-marker{opacity:.85}
.motion-wrap.playing .traj-svg .acq-label{opacity:1}
.motion-wrap.playing .traj-svg .pt-label{opacity:1;transition:opacity .4s ease}
@keyframes traj-draw{to{stroke-dashoffset:0}}

.motion-legend{display:flex;gap:22px;margin-top:18px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-dim);letter-spacing:.06em;flex-wrap:wrap}
.motion-legend .lg{display:flex;align-items:center;gap:8px}
.motion-legend .lg i{display:inline-block;width:14px;height:3px;border-radius:1px}
.motion-legend .lg.pre i{background:var(--navy)}
.motion-legend .lg.post i{background:var(--warn)}
.motion-legend .lg.acq i{background:transparent;border-top:1.5px dashed var(--gold);width:18px;height:0}

/* --- Tiers comparison --- */
.tiers-wrap{display:grid;grid-template-columns:1fr;gap:14px;margin-top:8px}
.tier-row{display:grid;grid-template-columns:120px 1fr 1fr;gap:14px;align-items:center;padding:8px 0;border-bottom:1px dashed var(--rule)}
.tier-row:last-child{border-bottom:none}
.tier-row .label{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--navy);letter-spacing:.14em;text-transform:uppercase;font-weight:500}
.tier-row .label small{display:block;color:var(--ink-faint);font-size:9.5px;letter-spacing:.06em;margin-top:2px;text-transform:none}
.tier-bar{position:relative;height:30px;background:#ebeef4;border:1px solid var(--rule);overflow:hidden}
.tier-bar .fill{position:absolute;top:0;bottom:0;left:0;width:0;transition:width 1.2s cubic-bezier(.2,.8,.2,1)}
.tier-bar.pre .fill{background:linear-gradient(90deg,var(--navy-bright),var(--navy))}
.tier-bar.post .fill{background:linear-gradient(90deg,var(--warn),#a83545)}
.tier-bar .pct{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink);font-weight:500;letter-spacing:.04em;z-index:2;opacity:0;transition:opacity .4s ease}
.tier-bar .pct.over{color:var(--paper-2)}
.motion-wrap.playing .tier-bar .pct{opacity:1;transition-delay:1.2s}
.motion-wrap.playing .tier-bar.pre .fill{width:var(--w,0%)}
.motion-wrap.playing .tier-bar.post .fill{width:var(--w,0%);transition-delay:.4s}
.tier-head{display:grid;grid-template-columns:120px 1fr 1fr;gap:14px;padding-bottom:8px;border-bottom:1px solid var(--navy);margin-bottom:6px}
.tier-head .label{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);font-weight:500}
.tier-head .pre-h{color:var(--navy);font-weight:600}
.tier-head .post-h{color:var(--warn);font-weight:600}
.tier-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:22px}
.tier-summary .ts{border:1px solid var(--rule-2);background:var(--paper);padding:14px 16px}
.tier-summary .ts .k{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-faint);letter-spacing:.16em;text-transform:uppercase}
.tier-summary .ts .v{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--navy-deep);font-weight:600;margin-top:4px;line-height:1}
.tier-summary .ts.up .v{color:var(--warn)}
.tier-summary .ts.down .v{color:var(--navy)}
.tier-summary .ts .s{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink-dim);margin-top:4px}


/* Stronger link styling */
a, a:visited{color:var(--navy-bright);text-decoration:underline;text-decoration-color:var(--gold-bright);text-underline-offset:3px}
a:hover{color:var(--gold);text-decoration-color:var(--gold)}
.q-card .bot .lnk, .gaza-card .tw .ln, .prof-detail .tpt .lnk, .ba-card .meta a, .spine .day .body a{
  display:inline-block;padding:3px 8px;border:1px solid var(--gold-bright);border-radius:2px;
  font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  font-weight:500;color:var(--gold-dim) !important;background:#eff3fb;text-decoration:none;
  transition:all .15s ease
}
.q-card .bot .lnk:hover, .gaza-card .tw .ln:hover, .prof-detail .tpt .lnk:hover, .ba-card .meta a:hover, .spine .day .body a:hover{
  background:var(--gold);color:var(--paper-2) !important;border-color:var(--gold)
}
.spine .day .body a{margin-left:8px;font-size:9.5px;padding:2px 7px}

</style>
